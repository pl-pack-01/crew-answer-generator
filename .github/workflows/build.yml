name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  version:
    name: Determine Version
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      image_version: ${{ steps.bump.outputs.image_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag and bump minor version
        id: bump
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            echo "new_tag=v1.0.0" >> "$GITHUB_OUTPUT"
            echo "image_version=1.0.0" >> "$GITHUB_OUTPUT"
          else
            major=$(echo "$latest" | sed 's/v//' | cut -d. -f1)
            minor=$(echo "$latest" | sed 's/v//' | cut -d. -f2)
            echo "new_tag=v${major}.$((minor + 1)).0" >> "$GITHUB_OUTPUT"
            echo "image_version=${major}.$((minor + 1)).0" >> "$GITHUB_OUTPUT"
          fi
          echo "Latest: $latest → Next: $(cat "$GITHUB_OUTPUT" | grep new_tag | cut -d= -f2)"

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, version]
    if: always() && needs.test.result == 'success' && (needs.version.result == 'success' || needs.version.result == 'skipped')
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Create git tag
        if: needs.version.outputs.new_tag
        run: |
          git tag ${{ needs.version.outputs.new_tag }}
          git push origin ${{ needs.version.outputs.new_tag }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},value=${{ needs.version.outputs.new_tag || '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.version.outputs.new_tag || '' }}
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build]
    if: needs.version.outputs.new_tag
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: ${{ needs.version.outputs.new_tag }}
          generate_release_notes: true
          body: |
            ## Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.version.outputs.image_version }}
            ```

            ## What's Changed
